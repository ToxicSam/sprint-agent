version: '3.8'

services:
  sprint-agent:
    build: .
    container_name: sprint-agent
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./web:/app/web
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s